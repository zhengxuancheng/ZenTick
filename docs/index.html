<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTick - Minimalist Meditation Timer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1b69 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .hero {
            text-align: center;
            max-width: 480px;
        }
        .icon {
            width: 120px;
            height: 120px;
            border-radius: 27px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(94, 108, 231, 0.3);
        }
        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>ZenTick</h1>
        <p class="tagline">Minimalist Meditation Timer</p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="support.html">Support</a>
        </div>
    </div>
</body>
</html>
